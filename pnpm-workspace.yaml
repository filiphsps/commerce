packages:
    - "packages/*"
    - "packages/tagtree/*"
    - "packages/cart/*"
    - "apps/*"
    - "!**/tests/fixtures/**"

allowBuilds:
    "@parcel/watcher": true
    "@swc/core": true
    "@scarf/scarf": true
    esbuild: true
    sharp: true
    unrs-resolver: true
    core-js: true
    core-js-pure: true
    mongodb-memory-server: true

minimumReleaseAge: 0

# @payloadcms/ui@3.85.0 imports @floating-ui/react without declaring it as a
# dependency. Hoist it to the root node_modules so Turbopack can resolve it
# when bundling payloadcms chunks from the .pnpm virtual store.
publicHoistPattern:
    - "@floating-ui/react"

# Nextra 4.6.1 + nextra-theme-docs 4.6.1 are incompatible with zod >=4.4.0
# due to stricter property iteration in `z.strictObject`. Pin to the last
# known-good version until Nextra ships a release with shuding/nextra#4990.
# Tracking: https://github.com/shuding/nextra/issues/4989
overrides:
    zod@^4: "4.4.3"
    "@types/react": "$@types/react"
    "@types/react-dom": "$@types/react-dom"
