name: '💾 Bootstrap Save'
description: 'Save the caches that bootstrap restored. Invoke with `if: always()` so caches persist even when the job fails. Keys must match the ones in `bootstrap`.'

inputs:
    node-modules-cache-hit:
        description: 'Pass `steps.<bootstrap-id>.outputs.node-modules-cache-hit`.'
        required: true
    turbo-cache-hit:
        description: 'Pass `steps.<bootstrap-id>.outputs.turbo-cache-hit`. Leave blank if bootstrap was invoked with `turbo-cache: false`.'
        required: false
        default: ''
    mongo-binary-cache-hit:
        description: 'Pass `steps.<bootstrap-id>.outputs.mongo-binary-cache-hit`.'
        required: false
        default: ''

runs:
    using: 'composite'
    steps:
        - name: 💾 Save node_modules
          if: inputs.node-modules-cache-hit != 'true'
          uses: actions/cache/save@v4
          with:
              path: |
                  node_modules
                  apps/*/node_modules
                  packages/*/node_modules
              key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

        - name: 💾 Save turbo cache
          if: inputs.turbo-cache-hit == 'false' && hashFiles('.turbo/**') != ''
          uses: actions/cache/save@v4
          with:
              path: .turbo
              key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}

        - name: 💾 Save mongodb-memory-server binary
          if: inputs.mongo-binary-cache-hit == 'false' && hashFiles('/home/runner/.cache/mongodb-binaries/**/*') != ''
          uses: actions/cache/save@v4
          with:
              path: /home/runner/.cache/mongodb-binaries
              key: ${{ runner.os }}-mongoms-${{ env.MONGOMS_VERSION }}
