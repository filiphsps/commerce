name: '💾 Bootstrap Save'
description: 'Save the caches that bootstrap restored. Invoke with `if: always()` so caches persist even when the job fails. Keys must match the ones in `bootstrap`. Only one job per workflow should own each cache — parallel saves with the same key race and all but one fail to reserve.'

inputs:
    node-modules-cache-hit:
        description: 'Pass `steps.<bootstrap-id>.outputs.node-modules-cache-hit`.'
        required: true
    turbo-cache-hit:
        description: 'Pass `steps.<bootstrap-id>.outputs.turbo-cache-hit`. Leave blank if bootstrap was invoked with `turbo-cache: false`.'
        required: false
        default: ''
    convex-backend-cache-hit:
        description: 'Pass `steps.<bootstrap-id>.outputs.convex-backend-cache-hit`.'
        required: false
        default: ''
    save-node-modules:
        description: 'Whether this job is the designated owner of the node_modules cache. Set true on exactly one job per workflow.'
        required: false
        default: 'false'
    save-turbo:
        description: 'Whether this job is the designated owner of the turbo cache. Set true on exactly one job per workflow.'
        required: false
        default: 'false'
    save-convex-backend:
        description: 'Whether this job is the designated owner of the Convex local-backend binary cache. Set true on exactly one job per workflow.'
        required: false
        default: 'false'

runs:
    using: 'composite'
    steps:
        - name: 💾 Save node_modules
          if: inputs.save-node-modules == 'true' && inputs.node-modules-cache-hit != 'true'
          uses: actions/cache/save@v5
          with:
              path: |
                  node_modules
                  apps/*/node_modules
                  packages/*/node_modules
              key: ${{ runner.os }}-node-modules-${{ github.head_ref || github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}

        - name: 💾 Save turbo cache
          if: inputs.save-turbo == 'true' && inputs.turbo-cache-hit == 'false' && hashFiles('.turbo/**') != ''
          uses: actions/cache/save@v5
          with:
              path: .turbo
              key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}

        - name: 💾 Save Convex local-backend binary
          if: inputs.save-convex-backend == 'true' && inputs.convex-backend-cache-hit == 'false' && hashFiles('/home/runner/.cache/convex/binaries/**/*') != ''
          uses: actions/cache/save@v5
          with:
              path: /home/runner/.cache/convex/binaries
              key: ${{ runner.os }}-convex-backend-${{ github.head_ref || github.ref_name }}-${{ env.CONVEX_LOCAL_BACKEND_VERSION }}
