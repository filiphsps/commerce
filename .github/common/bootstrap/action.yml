name: '📦 Bootstrap'
description: 'Install dependencies and prime caches (restore-only — pair with bootstrap-save).'

inputs:
    turbo-cache:
        description: 'Restore the local turbo cache (.turbo).'
        default: 'true'

outputs:
    node-modules-cache-hit:
        description: 'Whether node_modules cache was a hit on restore.'
        value: ${{ steps.cache-node-modules.outputs.cache-hit }}
    turbo-cache-hit:
        description: 'Whether turbo cache was a hit on restore. Empty when turbo-cache=false.'
        value: ${{ steps.cache-turbo.outputs.cache-hit }}
    mongo-binary-cache-hit:
        description: 'Whether the mongodb-memory-server binary cache was a hit on restore.'
        value: ${{ steps.cache-mongo-binary.outputs.cache-hit }}
    convex-backend-cache-hit:
        description: 'Whether the Convex local-backend binary cache was a hit on restore.'
        value: ${{ steps.cache-convex-backend.outputs.cache-hit }}

runs:
    using: 'composite'
    steps:
        - name: 🏎️ Setup pnpm
          uses: pnpm/action-setup@v6
          with:
              run_install: false

        - name: 🏎️ Setup Node
          uses: actions/setup-node@v6
          with:
              registry-url: 'https://registry.npmjs.org/'
              node-version-file: '.nvmrc'
              cache: 'pnpm'

        - name: 💾 Restore node_modules
          id: cache-node-modules
          uses: actions/cache/restore@v5
          with:
              path: |
                  node_modules
                  apps/*/node_modules
                  packages/*/node_modules
              key: ${{ runner.os }}-node-modules-${{ github.head_ref || github.ref_name }}-${{ hashFiles('pnpm-lock.yaml') }}
              restore-keys: |
                  ${{ runner.os }}-node-modules-${{ github.head_ref || github.ref_name }}-
                  ${{ runner.os }}-node-modules-master-
                  ${{ runner.os }}-node-modules-

        - name: 📦 Install dependencies
          if: steps.cache-node-modules.outputs.cache-hit != 'true'
          run: pnpm install --frozen-lockfile
          shell: bash

        - name: 💾 Restore turbo cache
          id: cache-turbo
          if: inputs.turbo-cache == 'true'
          uses: actions/cache/restore@v5
          with:
              path: .turbo
              key: ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.sha }}
              restore-keys: |
                  ${{ runner.os }}-turbo-${{ github.ref_name }}-
                  ${{ runner.os }}-turbo-master-
                  ${{ runner.os }}-turbo-

        - name: 💾 Restore mongodb-memory-server binary
          id: cache-mongo-binary
          uses: actions/cache/restore@v5
          with:
              path: /home/runner/.cache/mongodb-binaries
              key: ${{ runner.os }}-mongoms-${{ github.head_ref || github.ref_name }}-${{ env.MONGOMS_VERSION }}
              restore-keys: |
                  ${{ runner.os }}-mongoms-${{ github.head_ref || github.ref_name }}-
                  ${{ runner.os }}-mongoms-master-
                  ${{ runner.os }}-mongoms-

        - name: 💾 Restore Convex local-backend binary
          id: cache-convex-backend
          uses: actions/cache/restore@v5
          with:
              path: /home/runner/.cache/convex/binaries
              key: ${{ runner.os }}-convex-backend-${{ github.head_ref || github.ref_name }}-${{ env.CONVEX_LOCAL_BACKEND_VERSION }}
              restore-keys: |
                  ${{ runner.os }}-convex-backend-${{ github.head_ref || github.ref_name }}-
                  ${{ runner.os }}-convex-backend-master-
                  ${{ runner.os }}-convex-backend-
