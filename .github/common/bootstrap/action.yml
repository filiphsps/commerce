name: '📦 Bootstrap'
description: 'Install and configure dependencies'

runs:
    using: 'composite'
    steps:
        - name: 🏎️ Setup Node
          uses: actions/setup-node@v6
          with:
              registry-url: 'https://registry.npmjs.org/'
              node-version-file: '.nvmrc'

        - name: 🏎️ Setup pnpm
          uses: pnpm/action-setup@v3
          with:
              version: 11
              run_install: true
