name: Release

on:
    push:
        branches:
            - master
        paths:
            - "packages/tagtree/**"
            - "packages/react-payment-brand-icons/**"
            - ".changeset/**"
            - ".github/workflows/release.yml"

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write
    id-token: write

env:
    CI: true
    TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    TURBO_REMOTE_CACHE_TIMEOUT: 120

jobs:
    # Twin of deploy.yml's `convex` job (keep both in sync): when a release push lands on master,
    # push packages/convex/convex/** to the PRODUCTION Convex deployment so published packages
    # never run ahead of the backend they call. Requires the CONVEX_DEPLOY_KEY repository secret and
    # FAILS LOUDLY when it is absent (require-convex-deploy-key.sh) — a missing key is a hard error,
    # not a silent skip. The job is deliberately independent of `release` so a Convex outage cannot
    # block publishing the (Convex-unrelated) @tagtree/* packages.
    convex:
        name: 🌐 Deploy Convex (production)
        runs-on: ubuntu-latest
        if: github.repository == 'filiphsps/commerce'
        timeout-minutes: 15
        env:
            CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            # Fail the whole job when the deploy key is missing instead of skipping the deploy steps
            # green. Runs before bootstrap so it fails fast on nothing but a POSIX shell.
            - name: 🔑 Require the production deploy key
              run: bash .github/scripts/require-convex-deploy-key.sh

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap
              with:
                  turbo-cache: "false"
                  binary-caches: "false"

            # `convex deploy --dry-run` validates codegen, bundling and the schema against the LIVE
            # production data without promoting anything — the expand/contract pre-promotion gate.
            - name: 🧪 Convex deploy dry-run
              run: pnpm --filter @nordcom/commerce-convex convex:deploy:dry-run

            # Single-pass, unlike ci.yml's two-pass ephemeral deploy: the production deployment's
            # CONVEX_AUTH_* / CONVEX_SERVER_SECRET / CONVEX_REVALIDATE_SECRET env vars are seeded
            # once by the provisioning runbook, so auth-config validation passes on the first push.
            - name: 🌐 Deploy Convex to production
              run: pnpm convex:deploy

    release:
        name: 🚀 Release
        runs-on: ubuntu-latest
        if: github.repository == 'filiphsps/commerce'
        timeout-minutes: 20
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build packages
              run: pnpm build:packages

            - name: 📦 Create version PR or publish
              id: changesets
              uses: changesets/action@v1
              with:
                  publish: pnpm changeset:publish
                  version: pnpm changeset:version
                  commit: "chore(release): release packages"
                  title: "chore(release): release packages"
              env:
                  # No NPM_TOKEN — publishing uses OIDC trusted-publisher flow.
                  # `id-token: write` (above) lets the runner mint a GitHub OIDC
                  # token; npm exchanges it for a short-lived publish token IF
                  # the package has GitHub Actions configured as a trusted
                  # publisher on npmjs.com (Settings → Publishing Access →
                  # Trusted Publishers → Add → filiphsps/commerce, release.yml).
                  # Must be set up per @tagtree/* package before its first publish.
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_CONFIG_PROVENANCE: "true"
