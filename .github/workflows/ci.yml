name: CI

on:
    pull_request:
    push:
        branches:
            - master
            - staging
            - 'dev/*'
            - 'fix/*'
        paths-ignore:
            - '**.md'
            - '**.txt'
            - 'LICENSE'

env:
    CI: true
    MONGODB_URI: ${{ secrets.MONGODB_URI }}
    TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
    SHOPIFY_API_SECRET_KEY: ${{ secrets.SHOPIFY_API_SECRET_KEY }}
    AUTH_SECRET: 'development-secret'
    MONGODB_DATA_API_TOKEN: ${{ secrets.MONGODB_DATA_API_TOKEN }}
    MONGODB_DATA_API_URI: ${{ secrets.MONGODB_DATA_API_URI }}
    EDGE_CONFIG: ${{ secrets.EDGE_CONFIG }}

jobs:
    build:
        name: 🔨 Build
        needs: [lint, typecheck]
        timeout-minutes: 25
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v5

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build All
              run: pnpm run build

    test:
        name: 🧪 Test
        needs: [lint, typecheck]
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v5

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 🧪 Test
              run: pnpm run test

            - name: 🦺 Report Coverage to GitHub
              if: ${{ !cancelled() }}
              uses: davelosert/vitest-coverage-report-action@v2.8.1

            - name: 🦺 Codecov Coverage Reports
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@v5
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

            - name: 🦺 Codecov Test Results
              if: ${{ !cancelled() }}
              uses: codecov/test-results-action@v1
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    lint:
        name: 📋 Lint
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v5

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 📋 Lint
              run: pnpm run lint

    typecheck:
        name: ✅ Typecheck
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v5

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: ✅ Typecheck
              run: pnpm run typecheck

    dispatch:
        name: 🗣️ Dispatch
        needs: [build, test]
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v5
            # Deliberately empty as this is just used
            # to trigger other workflows when this one
            # completes successfully. Otherwise we can't
            # make sure that every test, lint and typecheck
            # job has validated and completed successfully.
