name: CI

on:
    pull_request:
    push:
        branches:
            - master
            - staging
            - 'dev/*'
            - 'fix/*'
        paths-ignore:
            - '**.md'
            - '**.txt'
            - 'LICENSE'

env:
    CI: true
    MONGODB_URI: ${{ secrets.MONGODB_URI }}
    TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
    TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
    SHOPIFY_API_SECRET_KEY: ${{ secrets.SHOPIFY_API_SECRET_KEY }}
    AUTH_SECRET: 'development-secret'
    SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    SENTRY_ORG: ${{ vars.SENTRY_ORG }}
    SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
    MONGODB_DATA_API_TOKEN: ${{ secrets.MONGODB_DATA_API_TOKEN }}
    MONGODB_DATA_API_URI: ${{ secrets.MONGODB_DATA_API_URI }}
    EDGE_CONFIG: ${{ secrets.EDGE_CONFIG }}

jobs:
    build:
        name: 🔨 Build
        needs: [lint, typecheck]
        timeout-minutes: 25
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build All
              run: pnpm run build

    test:
        name: 🧪 Test
        needs: [lint, typecheck]
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 🧪 Test
              run: pnpm run test

            - name: 🦺 Report Coverage to GitHub
              if: ${{ !cancelled() }}
              uses: davelosert/vitest-coverage-report-action@v2.7.0

            - name: 🦺 Codecov Coverage Reports
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@v6
              with:
                  files: ./coverage/coverage-final.json
                  flags: storefront,admin
              env:
                  CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

            - name: 🦺 Codecov Test Results
              if: ${{ !cancelled() }}
              uses: codecov/test-results-action@v1
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}

    lint:
        name: 📋 Lint
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 📋 Lint
              run: pnpm run lint

    typecheck:
        name: ✅ Typecheck
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: ✅ Typecheck
              run: pnpm run typecheck

    e2e:
        name: 🎭 E2E
        needs: build
        timeout-minutes: 20
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                app: [storefront, admin]
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6

            - name: 🚀 Bootstrap
              uses: ./.github/common/bootstrap

            - name: 🔨 Build Packages
              run: pnpm run build:packages

            - name: 🔨 Build App
              run: pnpm --filter @nordcom/commerce-${{ matrix.app }} build

            - name: 🎭 Install Playwright Browsers
              run: pnpm --filter @nordcom/commerce-${{ matrix.app }} exec playwright install --with-deps chromium

            - name: 🧪 Run Playwright Tests
              run: pnpm --filter @nordcom/commerce-${{ matrix.app }} test:e2e

            - name: 📦 Upload Report on Failure
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: playwright-report-${{ matrix.app }}
                  path: apps/${{ matrix.app }}/playwright-report/
                  retention-days: 7

    dispatch:
        name: 🗣️ Dispatch
        needs: [build, test]
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        timeout-minutes: 15
        runs-on: ubuntu-latest
        steps:
            - name: 🕶️ Checkout repository
              uses: actions/checkout@v6
            # Deliberately empty as this is just used
            # to trigger other workflows when this one
            # completes successfully. Otherwise we can't
            # make sure that every test, lint and typecheck
            # job has validated and completed successfully.
